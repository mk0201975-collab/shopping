    <title>Summer Floral Dress - My Shop</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f9f9f9;
        }

        .product-container {
            display: flex;
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .image-section {
            flex: 1;
            text-align: center;
        }

        .image-section img {
            max-width: 100%;
            border-radius: 5px;
        }

        .info-section {
            flex: 1;
            padding: 0 20px;
        }

        .price {
            font-size: 24px;
            color: #e44d26;
            font-weight: bold;
        }

        .size-picker {
            margin: 20px 0;
        }

        select {
            padding: 10px;
            width: 100%;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .buy-btn {
            background: #333;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .buy-btn:hover {
            background: #555;
        }
    </style>
</head>
